<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Caja Los Andes · CRV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #1a3a6b 0%, #0d2248 100%);
    color: #fff;
    height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 14px;
    overflow: hidden;
  }

  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px 24px;
    width: 100%;
    max-width: 700px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    flex: 1;
  }

  .servicios-label {
    font-size: 28px; font-weight: 900; color: #fff;
    letter-spacing: 0.04em; margin-bottom: 14px;
  }

  .servicios-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }

  .servicio-item {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 16px;
    background: rgba(255,255,255,0.1);
    border: 2.5px solid rgba(255,255,255,0.2);
    border-radius: 12px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; text-align: left;
  }
  .servicio-item:hover { border-color: rgba(255,255,255,0.5); }
  .servicio-item.selected { border-color: #f5a623; background: rgba(245,166,35,0.2); }
  .servicio-item input { display: none; }

  .check-box {
    width: 28px; height: 28px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .servicio-item.selected .check-box { background: #f5a623; border-color: #f5a623; color: #fff; }
  .servicio-icon { width: 44px; height: 44px; flex-shrink: 0; }
  .servicio-name { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.1; }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 14px 0 10px; }

  .punto-label {
    font-size: 15px; font-weight: 900;
    color: rgba(255,255,255,0.6); letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .punto-list { display: flex; flex-direction: row; gap: 10px; margin-bottom: 4px; }
  .punto-item {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 12px 10px;
    border: 2.5px solid transparent; border-radius: 10px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .punto-item.providencia { background: rgba(245,166,35,0.3); }
  .punto-item.nunoa       { background: rgba(52,211,153,0.25); }
  .punto-item.selected    { border-color: #fff; }
  .punto-item input { display: none; }
  .radio-box {
    width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .radio-inner { width: 10px; height: 10px; border-radius: 50%; background: transparent; transition: background 0.15s; }
  .punto-item.selected .radio-box { border-color: #fff; }
  .punto-item.selected .radio-inner { background: #fff; }
  .punto-name { font-size: 17px; font-weight: 900; color: #fff; }

  .btn {
    width: 100%; padding: 17px; background: #e53e3e; color: #fff;
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-size: 26px; font-weight: 900; letter-spacing: 0.06em;
    cursor: pointer; margin-top: 12px; transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* CONFIRMACIÓN */
  .result-done { display: none; flex-direction: column; align-items: center; gap: 12px; }
  .result-done.active { display: flex; }

  .llevamos-txt { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.06em; }

  .totales-row { display: flex; gap: 16px; align-items: flex-end; justify-content: center; }

  .total-bloque { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .total-num { font-size: 72px; font-weight: 900; line-height: 1; }
  .total-num.nunoa       { color: #34d399; }
  .total-num.providencia { color: #f5a623; }

  .total-sub { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }

  .separador-total { font-size: 60px; font-weight: 900; color: rgba(255,255,255,0.2); line-height: 1; margin-bottom: 6px; }

  .transacciones-txt { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; }

  .btn-nuevo {
    width: 100%; padding: 20px; background: #e53e3e; color: #fff;
    border: none; border-radius: 12px; font-family: 'Nunito', sans-serif;
    font-size: 26px; font-weight: 900; cursor: pointer; margin-top: 10px;
  }

  #pantalla-form.oculto { display: none; }
  .sending { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; display: none; }

  .listo-txt {
    font-size: 48px; font-weight: 900; color: #fff;
    letter-spacing: 0.04em; line-height: 1;
  }
  .total-sub { font-size: 17px; font-weight: 900; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; text-transform: uppercase; }
  .total-general-bloque { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 4px; }
  .total-general-num { font-size: 72px; font-weight: 900; color: #fff; line-height: 1; }
  .total-general-sub { font-size: 17px; font-weight: 900; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; }

  .barra-contenedor { width: 100%; margin-top: 6px; }
  .barra-track {
    position: relative;
    width: 100%; height: 28px;
    background: rgba(255,255,255,0.12);
    border-radius: 14px;
    overflow: hidden;
  }
  .barra-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, #34d399, #f5a623);
    border-radius: 14px;
    width: 0%;
    transition: width 0.8s ease;
  }

  .barra-labels {
    display: flex; justify-content: space-between;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    margin-top: 4px; padding: 0 2px;
  }
  .barra-pct {
    font-size: 22px; font-weight: 900; color: #fff;
    margin-top: 4px; letter-spacing: 0.04em;
  }

  .acercate-txt {
    font-size: 18px; font-weight: 700;
    color: rgba(255,255,255,0.8);
    line-height: 1.3;
  }
  .servicios-elegidos {
    display: flex; flex-direction: column; gap: 6px;
    width: 100%;
  }
  .servicio-elegido-item {
    font-size: 26px; font-weight: 900; color: #fff;
    background: rgba(255,255,255,0.1);
    border-radius: 10px; padding: 12px 16px;
  }
  .totales-hoy {
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: 10px; margin-top: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px 10px;
    width: 100%;
  }
  .total-hoy-bloque { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .total-hoy-num { font-size: 42px; font-weight: 900; line-height: 1; color: #fff; }
  .total-hoy-num.providencia { color: #f5a623; }
  .total-hoy-num.nunoa { color: #34d399; }
  .total-hoy-sub { font-size: 12px; font-weight: 900; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }
  .total-hoy-sep { font-size: 30px; color: rgba(255,255,255,0.2); font-weight: 900; }
  .hoy-label { font-size: 13px; font-weight: 900; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">

  <div id="pantalla-form">
    <div class="servicios-label">SERVICIO(S) ESCOGIDOS</div>
    <div class="servicios-list" id="lista-servicios">

      <label class="servicio-item" onclick="toggleCheckbox(this)">
        <input type="checkbox" value="Kit Agua-Fruta">
        <span class="check-box">✓</span>
        <svg class="servicio-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 10c-2-6 4-10 8-8" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
          <path d="M20 16c-10 2-16 12-16 22 0 14 10 24 18 24 3 0 6-2 10-2s7 2 10 2c8 0 18-10 18-24 0-10-6-20-16-22-3-1-6 0-9 2a1 1 0 01-6 0c-3-2-6-3-9-2z" fill="#ef4444"/>
          <path d="M20 16c-10 2-16 12-16 22 0 14 10 24 18 24 3 0 6-2 10-2" fill="#f87171"/>
          <ellipse cx="24" cy="32" rx="4" ry="7" fill="#fca5a5" opacity="0.5" transform="rotate(-15 24 32)"/>
        </svg>
        <span class="servicio-name">Kit Agua-Fruta</span>
      </label>

      <label class="servicio-item" onclick="toggleCheckbox(this)">
        <input type="checkbox" value="Bicicleta">
        <span class="check-box">✓</span>
        <svg class="servicio-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="44" r="11" stroke="#60a5fa" stroke-width="3.5"/>
          <circle cx="50" cy="44" r="11" stroke="#60a5fa" stroke-width="3.5"/>
          <circle cx="14" cy="44" r="3" fill="#60a5fa"/>
          <circle cx="50" cy="44" r="3" fill="#60a5fa"/>
          <path d="M14 44 L26 20 L38 20" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M26 20 L32 32 L50 44" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M32 32 L26 44 L14 44" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M36 20 L42 20" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
          <circle cx="26" cy="20" r="3" fill="#93c5fd"/>
        </svg>
        <span class="servicio-name">Bicicleta</span>
      </label>

      <label class="servicio-item" onclick="toggleCheckbox(this)">
        <input type="checkbox" value="Mecánica">
        <span class="check-box">✓</span>
        <svg class="servicio-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M44 8a12 12 0 00-11.8 14.2L10 44.4 10 54l9.6 0 22.2-22.2A12 12 0 1044 8z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="44" cy="20" r="5" fill="#fff" opacity="0.4"/>
        </svg>
        <span class="servicio-name">Mecánica</span>
      </label>

    </div>

    <hr class="divider">

    <div class="punto-label">PUNTO</div>
    <div class="punto-list" id="lista-punto">
      <label class="punto-item providencia" onclick="toggleRadio(this, 'lista-punto')">
        <input type="radio" name="punto" value="Providencia">
        <span class="radio-box"><span class="radio-inner"></span></span>
        <span class="punto-name">Providencia</span>
      </label>
      <label class="punto-item nunoa" onclick="toggleRadio(this, 'lista-punto')">
        <input type="radio" name="punto" value="Ñuñoa">
        <span class="radio-box"><span class="radio-inner"></span></span>
        <span class="punto-name">Ñuñoa</span>
      </label>
    </div>

    <button class="btn" id="btn-enviar" onclick="enviarFormulario()" disabled>ENVIAR</button>
    <div class="sending" id="sending-msg">Enviando... ⏳</div>
  </div>

  <!-- CONFIRMACIÓN -->
  <div class="result-done" id="result-done">
    <div class="listo-txt">¡LISTO!</div>
    <div class="acercate-txt">Acércate a una promotora y solicita:</div>
    <div class="servicios-elegidos" id="servicios-elegidos"></div>

    <div class="totales-hoy">
      <div class="total-hoy-bloque">
        <div class="total-hoy-num providencia" id="total-providencia">—</div>
        <div class="total-hoy-sub">Providencia</div>
      </div>
      <div class="total-hoy-sep">·</div>
      <div class="total-hoy-bloque">
        <div class="total-hoy-num nunoa" id="total-nunoa">—</div>
        <div class="total-hoy-sub">Ñuñoa</div>
      </div>
      <div class="total-hoy-sep">·</div>
      <div class="total-hoy-bloque">
        <div class="total-hoy-num" id="total-general">—</div>
        <div class="total-hoy-sub">Total</div>
      </div>
    </div>
    <div class="hoy-label">HOY</div>
    <button class="btn-nuevo" onclick="reiniciar()">NUEVO REGISTRO</button>
  </div>

</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwS0cl_gKHbRcE1jC0o3dfrob_0fH7h7EkZ6wnPd6iqB3mgjOp_aD3MlkGqdYTo-eIcgA/exec";

  function toggleCheckbox(el) {
    const cb = el.querySelector("input");
    cb.checked = !cb.checked;
    el.classList.toggle("selected", cb.checked);
    validarFormulario();
  }

  function toggleRadio(el, grupoId) {
    document.getElementById(grupoId).querySelectorAll(".punto-item").forEach(i => i.classList.remove("selected"));
    document.getElementById(grupoId).querySelectorAll("input").forEach(i => i.checked = false);
    el.classList.add("selected");
    el.querySelector("input").checked = true;
    validarFormulario();
  }

  function validarFormulario() {
    const ok = document.querySelectorAll("#lista-servicios input:checked").length > 0
            && document.querySelectorAll("#lista-punto input:checked").length > 0;
    document.getElementById("btn-enviar").disabled = !ok;
  }

  let serviciosEnviados = [];

  function enviarFormulario() {
    serviciosEnviados = [...document.querySelectorAll("#lista-servicios input:checked")].map(i => i.value);
    const punto = document.querySelector("#lista-punto input:checked")?.value || "";

    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("sending-msg").style.display = "block";

    const ts = new Date().toLocaleString("es-CL");
    const hoy = new Date().toLocaleDateString("es-CL");
    const params = new URLSearchParams({
      accion: "registrar",
      timestamp: ts,
      fecha: hoy,
      servicios: serviciosEnviados.join(" | "),
      punto: punto
    });

    fetch(APPS_SCRIPT_URL + "?" + params.toString())
      .then(r => r.json())
      .then(data => {
        document.getElementById("total-nunoa").textContent = data.nunoa ?? "?";
        document.getElementById("total-providencia").textContent = data.providencia ?? "?";
        const total = (data.nunoa ?? 0) + (data.providencia ?? 0);
        document.getElementById("total-general").textContent = total;

        const contenedor = document.getElementById("servicios-elegidos");
        contenedor.innerHTML = serviciosEnviados
          .map(s => `<div class="servicio-elegido-item">${s}</div>`)
          .join("");

        mostrarConfirmacion();
      })
      .catch(() => {
        document.getElementById("total-nunoa").textContent = "?";
        document.getElementById("total-providencia").textContent = "?";
        mostrarConfirmacion();
      });
  }

  function mostrarConfirmacion() {
    document.getElementById("pantalla-form").classList.add("oculto");
    document.getElementById("result-done").classList.add("active");
  }

  function reiniciar() {
    document.getElementById("result-done").classList.remove("active");
    document.getElementById("pantalla-form").classList.remove("oculto");
    document.querySelectorAll(".servicio-item, .punto-item").forEach(el => el.classList.remove("selected"));
    document.querySelectorAll("input").forEach(i => i.checked = false);
    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("sending-msg").style.display = "none";
  }
</script>
</body>
</html>
