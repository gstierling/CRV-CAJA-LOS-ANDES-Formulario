<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja Los Andes · CicloRecreoVía</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #f5a623;
    --radius: 14px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #00c8e8 0%, #0096c7 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    padding: 28px 20px;
    width: 100%;
    max-width: 500px;
    text-align: center;
    backdrop-filter: blur(8px);
  }

  .logo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--orange);
  }

  .logo-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }

  .services-label {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 20px;
  }

  .services-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }

  .service-item:hover { border-color: rgba(255,255,255,0.7); }

  .service-item.selected {
    border-color: #fff;
    background: rgba(255,255,255,0.28);
  }

  .service-item input[type="checkbox"] { display: none; }

  .check-box {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 7px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: transparent;
    transition: background 0.2s, border-color 0.2s;
  }

  .service-item.selected .check-box {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  .service-emoji { font-size: 28px; }

  .service-name {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
  }

  .btn {
    width: 100%;
    padding: 20px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 24px;
    font-weight: 900;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-back {
    width: 100%;
    padding: 16px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }

  .btn-back:hover { opacity: 0.85; }

  /* Pantalla confirmación */
  .result-done {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .result-done.active { display: flex; }

  .result-done .icon {
    font-size: 80px;
    line-height: 1;
    animation: pop 0.4s ease;
  }

  .result-done .msg-listo {
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .result-done .msg-sub {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  #pantalla-servicios { display: block; }
  #pantalla-servicios.oculto { display: none; }

  .sending {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>

<div class="card">

  <div class="logo-bar">
    <div class="logo-dot"></div>
    <span class="logo-text">CicloRecreoVía × Caja Los Andes</span>
    <div class="logo-dot"></div>
  </div>

  <!-- PASO 1: Selección de servicios -->
  <div id="pantalla-servicios">
    <div class="services-label">¿Qué SERVICIO(S) seleccionó el afiliado?</div>

    <div class="services-list">
      <label class="service-item" onclick="toggleService(this)">
        <input type="checkbox" value="Kit saludable (Agua + Fruta)">
        <span class="check-box">✓</span>
        <span class="service-emoji">🥤</span>
        <span class="service-name">Kit saludable (Agua + Fruta)</span>
      </label>
      <label class="service-item" onclick="toggleService(this)">
        <input type="checkbox" value="Préstamo de bicicleta">
        <span class="check-box">✓</span>
        <span class="service-emoji">🚲</span>
        <span class="service-name">Préstamo de bicicleta</span>
      </label>
      <label class="service-item" onclick="toggleService(this)">
        <input type="checkbox" value="Reparaciones mecánicas">
        <span class="check-box">✓</span>
        <span class="service-emoji">🔧</span>
        <span class="service-name">Reparaciones mecánicas</span>
      </label>
    </div>

    <button class="btn" id="btn-enviar" onclick="enviarServicios()" disabled>Confirmar →</button>
    <div class="sending" id="sending-msg">Enviando... ⏳</div>
  </div>

  <!-- PASO FINAL: Confirmación -->
  <div class="result-done" id="result-done">
    <div class="icon">✅</div>
    <div class="msg-listo">¡LISTO!</div>
    <div class="msg-sub">Acércate a una de las promotoras y solicita él o los servicios que hayas escogido.</div>
    <button class="btn-back" onclick="reiniciar()">← Nuevo registro</button>
  </div>

</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXrQ1RK0d8GM6MwX7iK31NQegKTXBX6k46c0TjiBzfmsTpPr5YnIe0waFd_nKgmgxfPQ/exec";

  function toggleService(el) {
    const checkbox = el.querySelector("input[type='checkbox']");
    checkbox.checked = !checkbox.checked;
    el.classList.toggle("selected", checkbox.checked);
    actualizarBoton();
  }

  function actualizarBoton() {
    const checked = document.querySelectorAll(".service-item input:checked").length;
    document.getElementById("btn-enviar").disabled = checked === 0;
  }

  function enviarServicios() {
    const servicios = [];
    document.querySelectorAll(".service-item input:checked").forEach(cb => {
      servicios.push(cb.value);
    });

    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("sending-msg").style.display = "block";

    const payload = {
      timestamp: new Date().toLocaleString("es-CL"),
      rut: "",
      pertenece: "Sí pertenece",
      servicios: servicios.join(" | ")
    };

    fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => mostrarConfirmacion())
    .catch(() => mostrarConfirmacion());
  }

  function mostrarConfirmacion() {
    document.getElementById("pantalla-servicios").classList.add("oculto");
    document.getElementById("result-done").classList.add("active");
  }

  function reiniciar() {
    document.getElementById("result-done").classList.remove("active");
    document.getElementById("pantalla-servicios").classList.remove("oculto");
    document.querySelectorAll(".service-item").forEach(el => el.classList.remove("selected"));
    document.querySelectorAll(".service-item input").forEach(cb => cb.checked = false);
    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("sending-msg").style.display = "none";
  }
</script>

</body>
</html>
